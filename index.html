<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fine-Grain Snake - Manual Start</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a1a; color: #00ff41; font-family: 'Courier New', Courier, monospace; flex-direction: column; }
        canvas { border: 2px solid #00ff41; background-color: #000; display: block; }
        .ui-container { position: relative; width: 400px; height: 400px; }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: rgba(0,0,0,0.7); font-weight: bold; font-size: 1.2rem;
            text-align: center; pointer-events: none;
        }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>Score: <span id="score">0</span></h1>
    <div class="ui-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
        <div id="overlay">PRESS AN ARROW KEY<br>TO START</div>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const overlay = document.getElementById("overlay");

        const box = 10;
        const gridCount = canvas.width / box;
        
        let score = 0;
        let snake = [{ x: 20 * box, y: 20 * box }];
        let food = getRandomFood();
        
        // Direction starts as null so the snake sits still
        let d = null;
        let nextD = null;
        let gameStarted = false;

        document.addEventListener("keydown", (e) => {
            // Map arrow keys to directions
            let newDir = null;
            if(e.keyCode == 37 && d != "RIGHT") newDir = "LEFT";
            else if(e.keyCode == 38 && d != "DOWN") newDir = "UP";
            else if(e.keyCode == 39 && d != "LEFT") newDir = "RIGHT";
            else if(e.keyCode == 40 && d != "UP") newDir = "DOWN";

            if(newDir) {
                nextD = newDir;
                // If it's the first move, hide the overlay and start logic
                if(!gameStarted) {
                    gameStarted = true;
                    overlay.style.display = "none";
                }
            }
        });

        function getRandomFood() {
            return {
                x: Math.floor(Math.random() * gridCount) * box,
                y: Math.floor(Math.random() * gridCount) * box
            };
        }

        function draw() {
            // Clear background
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Food
            ctx.fillStyle = "#ff3e3e";
            ctx.fillRect(food.x, food.y, box, box);

            // Draw Snake
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff41" : "#008f11"; 
                ctx.fillRect(snake[i].x, snake[i].y, box - 1, box - 1);
            }

            // Only move the snake if the game has started
            if (gameStarted) {
                d = nextD;
                
                let snakeX = snake[0].x;
                let snakeY = snake[0].y;

                if(d == "LEFT") snakeX -= box;
                if(d == "UP")   snakeY -= box;
                if(d == "RIGHT") snakeX += box;
                if(d == "DOWN")  snakeY += box;

                // Food collision
                if(snakeX == food.x && snakeY == food.y) {
                    score++;
                    scoreElement.innerHTML = score;
                    food = getRandomFood();
                } else {
                    snake.pop();
                }

                let newHead = { x: snakeX, y: snakeY };

                // Game Over logic
                if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                    clearInterval(gameLoop);
                    alert("Game Over! Score: " + score);
                    location.reload();
                }

                snake.unshift(newHead);
            }
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        // Run the draw function every 70ms
        const gameLoop = setInterval(draw, 70);
    </script>
</body>
</html>
