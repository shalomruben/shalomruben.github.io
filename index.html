<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fine-Grain Snake</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a1a; color: #00ff41; font-family: 'Courier New', Courier, monospace; flex-direction: column; }
        canvas { border: 2px solid #00ff41; background-color: #000; image-rendering: pixelated; }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>Score: <span id="score">0</span></h1>
    <canvas id="snakeGame" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // --- GRID SETTINGS ---
        const box = 10; // Smaller boxes for a finer grid
        const gridCount = canvas.width / box; // 400 / 10 = 40 boxes across
        
        let score = 0;
        let snake = [{ x: 20 * box, y: 20 * box }];
        let food = getRandomFood();
        let d = "RIGHT"; // Start moving right immediately
        let nextD = "RIGHT";

        // Prevent "self-collision" by buffering the next direction
        document.addEventListener("keydown", (e) => {
            if(e.keyCode == 37 && d != "RIGHT") nextD = "LEFT";
            else if(e.keyCode == 38 && d != "DOWN") nextD = "UP";
            else if(e.keyCode == 39 && d != "LEFT") nextD = "RIGHT";
            else if(e.keyCode == 40 && d != "UP") nextD = "DOWN";
        });

        function getRandomFood() {
            return {
                x: Math.floor(Math.random() * gridCount) * box,
                y: Math.floor(Math.random() * gridCount) * box
            };
        }

        function draw() {
            d = nextD; // Apply the buffered direction
            
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Snake
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#00ff41" : "#008f11"; 
                ctx.fillRect(snake[i].x, snake[i].y, box - 1, box - 1); // -1 creates a tiny gap between segments
            }

            // Draw Food
            ctx.fillStyle = "#ff3e3e";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if(d == "LEFT") snakeX -= box;
            if(d == "UP")   snakeY -= box;
            if(d == "RIGHT") snakeX += box;
            if(d == "DOWN")  snakeY += box;

            // Collision with Food
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = getRandomFood();
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // Game Over: Walls or Self
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Score: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        // Increase 100 to make it slower, decrease to make it faster
        let game = setInterval(draw, 70); 
    </script>
</body>
</html>
